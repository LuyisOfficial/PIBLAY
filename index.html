<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PIBLAY - Plateforme Publicitaire Intelligente</title>

<meta name="description" content="Piblay connecte entreprises et agences marketing pour des campagnes performantes.">

<!-- SEO -->
<meta name="robots" content="index, follow">

<!-- Open Graph -->
<meta property="og:title" content="PIBLAY">
<meta property="og:description" content="Plateforme publicitaire intelligente">
<meta property="og:image" content="./images/logo.png">
<meta property="og:type" content="website">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="./images/logo.png">

<!-- Favicon -->
<link rel="icon" href="./images/favicon.ico">

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0a192f">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">

<!-- Ionicons (IMPORTANT manquant) -->
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>

<style>
:root{
    --orange:#ec6111;
    --dark:#0a192f;
    --text:#e6f1ff;
}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background: radial-gradient(circle,#0a192f,#000);
    color:var(--text);
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
}

header img{
    width:120px;
    background:white;
    padding:5px;
    border-radius:14px;
}

nav a{
    margin-left:20px;
    text-decoration:none;
    color:white;
    font-weight:600;
}

.btn-login{
    background:var(--orange);
    padding:10px 18px;
    border-radius:8px;
}

.hero{
    text-align:center;
    padding:100px 20px;
}

.hero h1{
    font-size:2.8rem;
    color:var(--orange);
}

.hero p{
    max-width:600px;
    margin:20px auto;
    color:#8892b0;
}

.hero button{
    padding:16px 30px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#ffd700,#ffcc00);
    color:black;
    font-weight:bold;
    cursor:pointer;
}

.features{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:50px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:25px;
    border-radius:15px;
    text-align:center;
}

.card ion-icon{
    font-size:40px;
    color:var(--orange);
}

.cta{
    text-align:center;
    padding:80px 20px;
}

.cta button{
    padding:18px 40px;
    background:var(--orange);
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

.chat-floating{
    position:fixed;
    bottom:20px;
    right:20px;
    background:var(--orange);
    padding:15px;
    border-radius:50%;
    cursor:pointer;
}

.chat-menu{
    position:fixed;
    bottom:80px;
    right:20px;
    background:#ffd700;
    color:black;
    width:250px;
    border-radius:10px;
    display:none;
}

.chat-menu.active{ display:block; }

.chat-option{
    display:flex;
    gap:10px;
    padding:10px;
    text-decoration:none;
    color:black;
}

@media(max-width:600px){
    .hero h1{ font-size:2rem; }
}
</style>

</head>

<body>

<header>
    <img src="./images/logo.png" alt="PIBLAY logo">

    <nav>
        <a href="./register.html">Commencer</a>
        <a href="./login.html" class="btn-login">Connexion</a>
    </nav>
</header>

<section class="hero">
    <h1>La Publicité Nouvelle Génération</h1>

    <img src="./images/entre.png" alt="Publicité intelligente" style="width:100%;max-width:600px;margin:20px 0;">

    <p>
        PIBLAY connecte les entreprises avec les meilleures agences
        pour créer des campagnes performantes.
    </p>


</section>

<section class="features">

    <div class="card">
        <ion-icon name="rocket-outline"></ion-icon>
        <h3>Campagnes intelligentes</h3>
    </div>

    <div class="card">
        <ion-icon name="people-outline"></ion-icon>
        <h3>Connexion agences</h3>
    </div>

    <div class="card">
        <ion-icon name="analytics-outline"></ion-icon>
        <h3>Analytics</h3>
    </div>

    <div class="card">
        <ion-icon name="shield-checkmark-outline"></ion-icon>
        <h3>Sécurité</h3>
    </div>

</section>

<section class="cta">
    <h2>Prêt à booster votre business ?</h2>
    <button onclick="goRegister()">🚀 Commencer</button>
</section>

<!-- CHAT -->
<div class="chat-menu" id="chatMenu">

    <a href="https://chat.whatsapp.com/LrCq7YCvhDC6yTLXGeAAxY" target="_blank" class="chat-option">
        <ion-icon name="people-outline"></ion-icon>
        GROUP PIBLAY
    </a>

    <a href="https://wa.me/50940894038" target="_blank" class="chat-option">
        <ion-icon name="logo-whatsapp"></ion-icon>
        CONTACT
    </a>

    <a href="mailto:info.piblay@gmail.com" class="chat-option">
        <ion-icon name="mail-outline"></ion-icon>
        EMAIL
    </a>

</div>

<div class="chat-floating" id="chatBtn">
    <ion-icon name="chatbubbles-outline"></ion-icon>
</div>

<script>

function goRegister(){
    window.location.href = "./register.html";
}

document.getElementById("chatBtn").onclick = () => {
    document.getElementById("chatMenu").classList.toggle("active");
};

// PWA
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js")
    .catch(()=>{});
}

</script>

</body>
</html>
