<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | PIBLAY</title>
    
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="auth-container">
        <h2 class="title-gold">Bon retour !</h2>
        <p>Connectez-vous à votre espace PIBLAY.</p>

        <div id="status-msg"></div>

        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email professionnel" required>
            <input type="password" id="loginPassword" placeholder="Mot de passe" required>
            <button type="submit" class="btn-submit">SE CONNECTER</button>
        <p class="forgot-link"><a href="/forgot.html">Mot de passe oublié ?</a></p>
        </form>

        <p class="footer-link">
            Pas encore de compte ? <a href="/register.html">S'inscrire</a>
        </p>
    </div>
<script>
    async function login(){

    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    const res = await fetch("http://localhost:3000/login", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        credentials:"include",
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if(data.role==="client") window.location="client-dashboard.html";
    if(data.role==="agency") window.location="agency-dashboard.html";
}

async function loadProfile(){

    const res = await fetch("http://localhost:3000/me", {
        credentials:"include"
    });

    if(res.status===401){
        window.location="login.html";
        return;
    }

    const user = await res.json();

    document.getElementById("status").innerText =
        user.active ? "Compte actif" : "Compte non actif";
}

if(user.blocked){
    return res.status(403).json({ message:"Compte bloqué" });
}


app.post("/login", (req,res)=>{
    const { email, password } = req.body;

    const user = users.find(u => u.email === email);

    if(!user){
        track("FAILED", email, req);

        // 🔴 DETECTION ICI
        if(logs.filter(l => l.ip === req.ip && l.type==="FAILED").length > 5){
            logs.push({
                type:"ALERT",
                email,
                ip:req.ip,
                date:Date.now()
            });
        }

        return res.status(400).json({ message:"Erreur login" });
    }

    // (ajoute ici aussi si password faux)
});

</script>
<script src="js/app.js"></script>
<script src="js/login.js"></script>
</body>
</html>
