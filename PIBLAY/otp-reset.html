<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset OTP - PIBLAY</title>

<link rel="stylesheet" href="css/register.css">

<style>
.step { display:none; }
.step.active { display:block; }

#msg{
    text-align:center;
    margin-bottom:10px;
    font-size:0.9rem;
}

.success{ color:#34d399; }
.error{ color:#f87171; }

.otp-input{
    display:flex;
    gap:10px;
    justify-content:center;
    margin:20px 0;
}

.otp-input input{
    width:45px;
    height:55px;
    text-align:center;
    font-size:20px;
    border-radius:8px;
    border:1px solid #ec6111;
    background:#112240;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>Réinitialisation sécurisée</h2>

<div id="msg"></div>

<!-- STEP 1 EMAIL -->
<div class="step active" id="step1">
    <input type="email" id="email" placeholder="Votre email" required>
    <button class="main-btn" onclick="sendOTP()">Recevoir code</button>
</div>

<!-- STEP 2 OTP -->
<div class="step" id="step2">
    <p style="text-align:center;">Entrez le code reçu</p>

    <div class="otp-input">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
        <input maxlength="1">
    </div>

    <button class="main-btn" onclick="verifyOTP()">Vérifier</button>
</div>

<!-- STEP 3 PASSWORD -->
<div class="step" id="step3">
    <input type="password" id="newPass" placeholder="Nouveau mot de passe (min 6 caractères)">
    <button class="main-btn" onclick="resetPass()">Changer mot de passe</button>
</div>

</div>

<script>

let emailGlobal = "";
let otpToken = "";

const msg = document.getElementById("msg");

// STEP SWITCH
function goStep(n){
    document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
    document.getElementById("step"+n).classList.add("active");
}

// ================= SEND OTP =================
async function sendOTP(){
    const email = document.getElementById("email").value;

    if(!email.includes("@")){
        msg.className="error";
        msg.innerText="Email invalide";
        return;
    }

    emailGlobal = email;

    try{
        const res = await fetch("http://localhost:3000/send-otp",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ email })
        });

        msg.className="success";
        msg.innerText="✔ Code envoyé (vérifiez votre email)";

        goStep(2);

    }catch{
        msg.className="error";
        msg.innerText="Erreur serveur";
    }
}

// ================= VERIFY OTP =================
async function verifyOTP(){

    const inputs = document.querySelectorAll(".otp-input input");
    let code = "";

    inputs.forEach(i => code += i.value);

    if(code.length !== 6){
        msg.className="error";
        msg.innerText="Code incomplet";
        return;
    }

    try{
        const res = await fetch("http://localhost:3000/verify-otp",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ email: emailGlobal, code })
        });

        const data = await res.json();

        if(data.success){
            otpToken = data.token;

            msg.className="success";
            msg.innerText="✔ Code validé";

            goStep(3);
        }else{
            msg.className="error";
            msg.innerText="Code incorrect";
        }

    }catch{
        msg.className="error";
        msg.innerText="Erreur serveur";
    }
}

// ================= RESET PASSWORD =================
async function resetPass(){

    const password = document.getElementById("newPass").value;

    if(password.length < 6){
        msg.className="error";
        msg.innerText="Mot de passe trop court";
        return;
    }

    try{
        await fetch("http://localhost:3000/reset-password-otp",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ token: otpToken, password })
        });

        msg.className="success";
        msg.innerText="✔ Mot de passe changé";

        setTimeout(()=>{
            window.location.href = "login.html";
        },1500);

    }catch{
        msg.className="error";
        msg.innerText="Erreur serveur";
    }
}

// UX OTP auto focus
document.querySelectorAll(".otp-input input").forEach((input, index, inputs)=>{
    input.addEventListener("input", ()=>{
        if(input.value && inputs[index+1]){
            inputs[index+1].focus();
        }
    });
});

</script>

</body>
</html>
