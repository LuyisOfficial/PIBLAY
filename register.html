<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription - PIBLAY</title>

<link rel="stylesheet" href="./register.css">
<link rel="icon" href="./favicon.ico">

</head>

<body>

<div class="container">

<h1>Créer un compte PIBLAY</h1>

<select id="accountType">
    <option value="client">Propriétaire d'activité</option>
</select>

<div id="statusMsg"></div>

<!-- CLIENT -->
<form id="clientForm">

<h3>Profil</h3>

<input type="file" id="clientAvatar" accept="image/*">
    
<input type="text" id="clientName" placeholder="Nom complet" required>
<input type="email" id="clientEmail" placeholder="Email" required>
<input type="password" id="clientPassword" placeholder="Mot de passe" required>

<h3>Entreprise</h3>

<input type="text" id="businessName" placeholder="Nom entreprise" required>

<select id="businessType">
    <option value="ecommerce">E-commerce</option>
    <option value="service">Service</option>
    <option value="restaurant">Restaurant</option>
</select>

<input type="url" id="website" placeholder="Site web">
<textarea id="goal" placeholder="Objectif marketing..." required></textarea>

<button class="btn-submit" type="submit">Créer compte client</button>

</form>

<!-- AGENCE -->
<form id="agencyForm" style="display:none;">

<h3>Profil agence</h3>

<input type="file" id="agencyAvatar" accept="image/*">
<input type="file" id="agencyBanner" accept="image/*">

<input type="text" id="agencyName" placeholder="Nom agence" required>
<input type="email" id="agencyEmail" placeholder="Email" required>
<input type="password" id="agencyPassword" placeholder="Mot de passe" required>

<input type="text" id="agencyPhone" placeholder="Téléphone">

<select id="specialization">
    <option value="meta">Meta Ads</option>
    <option value="google">Google Ads</option>
</select>

<textarea id="agencyDescription" placeholder="Description agence"></textarea>

<button class="btn-submit" type="submit">Créer compte agence</button>

</form>

</div>

<script>
// ================= CONFIG =================
const API_URL = "http://localhost:3000/api";

// ================= UI =================
const typeSelect = document.getElementById("accountType");
const clientForm = document.getElementById("clientForm");
const agencyForm = document.getElementById("agencyForm");
const statusMsg = document.getElementById("statusMsg");

// SWITCH FORM
typeSelect.addEventListener("change", () => {
    const isClient = typeSelect.value === "client";
    clientForm.style.display = isClient ? "block" : "none";
    agencyForm.style.display = isClient ? "none" : "block";
});

// ================= HELPERS =================

// VALIDATION EMAIL
function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// VALIDATION PASSWORD (SaaS sécurisé)
function validatePassword(password) {
    return password.length >= 8;
}

// FILE UPLOAD (SÉCURISÉ)
function getFile(file) {
    if (!file) return null;
    if (file.size > 2 * 1024 * 1024) {
        throw new Error("Image trop lourde (max 2MB)");
    }
    return file;
}

// ================= API CALL =================
async function registerUser(data) {
    const response = await fetch(`${API_URL}/auth/register`, {
        method: "POST",
        credentials: "include", // cookies sécurisé
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    if (!response.ok) {
        throw new Error(result.message || "Erreur serveur");
    }

    return result;
}

// ================= CLIENT REGISTER =================
clientForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    try {
        statusMsg.innerText = "Création...";
        statusMsg.style.color = "orange";

        // VALIDATION
        if (!validateEmail(clientEmail.value)) {
            throw new Error("Email invalide");
        }

        if (!validatePassword(clientPassword.value)) {
            throw new Error("Mot de passe trop court (8 caractères minimum)");
        }

        const userData = {
            fullname: clientName.value.trim(),
            email: clientEmail.value.trim(),
            password: clientPassword.value,
            role: "client",
            business: {
                name: businessName.value,
                type: businessType.value,
                website: website.value,
                goal: goal.value
            }
        };

        await registerUser(userData);

        statusMsg.style.color = "green";
        statusMsg.innerText = "Compte créé ✔";

        setTimeout(() => {
            window.location.href = "client-dashboard.html";
        }, 1200);

    } catch (err) {
        statusMsg.style.color = "red";
        statusMsg.innerText = err.message;
    }
});

// ================= AGENCY REGISTER =================
agencyForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    try {
        statusMsg.innerText = "Création...";
        statusMsg.style.color = "orange";

        if (!validateEmail(agencyEmail.value)) {
            throw new Error("Email invalide");
        }

        if (!validatePassword(agencyPassword.value)) {
            throw new Error("Mot de passe trop court");
        }

        const userData = {
            fullname: agencyName.value.trim(),
            email: agencyEmail.value.trim(),
            password: agencyPassword.value,
            role: "agency",
            agency: {
                phone: agencyPhone.value,
                specialization: specialization.value,
                description: agencyDescription.value
            }
        };

        await registerUser(userData);

        statusMsg.style.color = "green";
        statusMsg.innerText = "Compte agence créé ✔";

        setTimeout(() => {
            window.location.href = "agency-dashboard.html";
        }, 1200);

    } catch (err) {
        statusMsg.style.color = "red";
        statusMsg.innerText = err.message;
    }
});
    
</script>
<script src="./enregister.js"></script>
</body>
</html>
