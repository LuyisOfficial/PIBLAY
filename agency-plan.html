<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activation Agence - PIBLAY</title>

<!-- chemins corrigés -->
<link rel="stylesheet" href="./css/plan-a.css">
<link rel="icon" href="./images/favicon.png" type="image/png">

<style>
.container {
    max-width: 400px;
    margin: auto;
    text-align: center;
    padding: 50px 30px;
}

.price-box {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
    margin: 20px 0;
}

.price-box h3 {
    font-size: 2rem;
    color: #ffd700;
}

.info {
    font-size: 0.9rem;
    color: #94a3b8;
}

#paypal-button-container {
    margin-top: 30px;
}
</style>

</head>

<body>

<div class="container">

<h2>Activation Agence</h2>

<div class="price-box">
    <p>Abonnement mensuel</p>
    <h3>10$ / mois</h3>
</div>

<p class="info">
Active ton compte agence pour accéder à la plateforme PIBLAY 🚀
</p>

<div id="paypal-button-container"></div>

</div>

<!-- PayPal SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=AZOGWj2PpwXjsung8boLnKMrjD_wCOjU6d6Wo8m7ZEoU33ycX96BFe2MFXrt1f3Rqws753Z8hBRLjJcP"></script>

<script>

const role = "agency";

// 💳 bouton PayPal
paypal.Buttons({

    createOrder: function(data, actions) {
        return actions.order.create({
            purchase_units: [{
                amount: { value: "10.00" }
            }]
        });
    },

    onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {

            // ⚠️ MODE DEMO (GitHub Pages)
            console.log("Paiement validé :", details);

            // simulation activation
            let user = JSON.parse(localStorage.getItem("user")) || {};
            user.planActive = true;
            user.role = role;

            localStorage.setItem("user", JSON.stringify(user));

            alert("Paiement réussi ✔ (mode démo)");

            // redirection
            window.location.href = "./success.html";
        });
    },

    onError: function(err){
        alert("Erreur paiement ❌");
        console.error(err);
    }

}).render('#paypal-button-container');

</script>

</body>
</html>
