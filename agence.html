<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agences PIBLAY</title>

<link rel="stylesheet" href="css/agence.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
#lock-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
}
.lock-card {
    background: #0a192f;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
}
.agency-card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
}
</style>

</head>

<body>

<!-- 🔒 LOCK -->
<div id="lock-overlay">
    <div class="lock-card">
        <i class="fas fa-lock"></i>
        <h2>Accès premium</h2>
        <p>Vous devez activer un plan pour voir les agences</p>
        <a href="plans.html">Voir les plans</a>
    </div>
</div>

<div class="container">

<header>
    <h1>Agences Certifiées PIBLAY</h1>
</header>

<div class="agencies-grid" id="agenciesGrid"></div>

</div>

<script>

// ================= AUTH =================
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
    alert("Connexion requise");
    window.location.href = "login.html";
}

// ================= CHECK ROLE =================
if(user.role !== "client"){
    alert("Accès réservé aux clients");
    window.location.href = "login.html";
}

// ================= CHECK PLAN =================
if(!user.planActive){
    document.getElementById("lock-overlay").style.display = "flex";
}

// ================= LOAD AGENCIES =================
async function loadAgencies(){

    const res = await fetch("http://localhost:3000/agencies");
    const agencies = await res.json();

    const container = document.getElementById("agenciesGrid");
    container.innerHTML = "";

    // 🔥 FILTRE : seulement agences actives
    const activeAgencies = agencies.filter(a => a.active === true);

    activeAgencies.forEach(a=>{

        container.innerHTML += `
        <div class="agency-card">

            <h3>${a.name}</h3>
            <p>${a.description || "Agence professionnelle"}</p>

            <p>Spécialité: ${a.specialization}</p>

            <p>⭐ ${a.rating || "5.0"}</p>

            <button onclick="chooseAgency('${a.id}')">
                Choisir cette agence
            </button>

        </div>
        `;
    });
}

loadAgencies();

// ================= CHOISIR AGENCE =================
async function chooseAgency(id){

    await fetch("http://localhost:3000/client/select-agency",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            client: user.email,
            agencyId: id
        })
    });

    alert("Agence sélectionnée ✔");
    window.location.href = "client-dashboard.html";
}



// ================= GET AGENCIES =================
app.get("/agencies", (req,res)=>{
    const agencies = users.filter(u =>
        u.role === "agency" &&
        u.planActive === true // 🔥 AGENCE PAYANTE
    );

    res.json(agencies);
});

// ================= SELECT AGENCY =================
app.post("/client/select-agency", (req,res)=>{
    const { client, agencyId } = req.body;

    const user = users.find(u => u.email === client);

    user.agency = agencyId;

    res.json({ success:true });
}); 

</script>
<script src="js/agence.js"></script>

</body>
</html>
