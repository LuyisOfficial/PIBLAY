<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choisir un plan - PIBLAY</title>

<link rel="stylesheet" href="css/style.css">

<style>
.container {
    max-width: 900px;
    margin: auto;
    padding: 40px 20px;
    text-align: center;
}

.plans {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
    margin-top: 30px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 15px;
    border: 1px solid rgba(236,97,17,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card.active {
    border: 2px solid #ffd700;
}

button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    background: linear-gradient(135deg,#ffd700,#ffcc00);
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

#paypal-button-container {
    margin-top: 40px;
}
</style>

</head>

<body>

<div class="container">

<h2>Choisir un plan</h2>
<p>Sélectionnez votre abonnement pour commencer 🚀</p>

<div class="plans">

<div class="card" onclick="selectPlan('basic',30,this)">
    <h3>Basic</h3>
    <p>30$/mois</p>
    <button>Choisir</button>
</div>

<div class="card" onclick="selectPlan('pro',57,this)">
    <h3>Pro</h3>
    <p>57$/mois</p>
    <button>Choisir</button>
</div>

<div class="card" onclick="selectPlan('premium',85,this)">
    <h3>Premium</h3>
    <p>85$/mois</p>
    <button>Choisir</button>
</div>

</div>

<div id="paypal-button-container"></div>

</div>

<!-- PayPal SDK -->
<script src="https://www.paypal.com/sdk/js?client-id=AZOGWj2PpwXjsung8boLnKMrjD_wCOjU6d6Wo8m7ZEoU33ycX96BFe2MFXrt1f3Rqws753Z8hBRLjJcP"></script>

<script>

let selectedPlan = null;
let selectedPrice = 0;

// 🔥 sélection plan
function selectPlan(plan, price, el){

    selectedPlan = plan;
    selectedPrice = price;

    document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
    el.classList.add("active");
}

// 🔐 récupérer role
const role = localStorage.getItem("role") || "client";

// 💳 PAYPAL BUTTON
paypal.Buttons({

    createOrder: function(data, actions) {

        if(!selectedPlan){
            alert("Choisis un plan d'abord");
            return;
        }

        return actions.order.create({
            purchase_units: [{
                amount: {
                    value: selectedPrice
                }
            }]
        });
    },

    onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {

            // 🔐 envoyer au backend
            fetch("http://localhost:3000/verify-payment", {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({
                    plan: selectedPlan,
                    role: role,
                    payer: details.payer.email_address
                })
            });

            // 🎯 redirection
            window.location.href = "success.html";
        });
    },

    onError: function(err){
        alert("Erreur paiement ❌");
        console.error(err);
    }

}).render('#paypal-button-container');

</script>

</body>
</html>
