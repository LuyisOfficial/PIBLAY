<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion | PIBLAY</title>

<link rel="icon" href="./images/favicon.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="./css/login.css">
</head>

<body>

<div class="auth-container">
    <h2 class="title-gold">Bon retour !</h2>
    <p>Connectez-vous à votre espace PIBLAY.</p>

    <div id="status-msg"></div>

    <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email professionnel" required>
        <input type="password" id="loginPassword" placeholder="Mot de passe" required>

        <button type="submit" class="btn-submit">SE CONNECTER</button>

        <p class="forgot-link">
            <a href="./forgot.html">Mot de passe oublié ?</a>
        </p>
    </form>

    <p class="footer-link">
        Pas encore de compte ? <a href="./register.html">S'inscrire</a>
    </p>
</div>

<script>

// ================= LOGIN DEMO =================
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;
    const msg = document.getElementById("status-msg");

    msg.innerText = "Connexion en cours...";
    msg.style.color = "#ffd700";

    // 🔥 simulation login
    setTimeout(() => {

        if(email === "admin@piblay.com"){
            localStorage.setItem("user", JSON.stringify({
                email,
                role:"admin"
            }));
            window.location.href = "./admin.html";
            return;
        }

        if(email.includes("agency")){
            localStorage.setItem("user", JSON.stringify({
                email,
                role:"agency"
            }));
            window.location.href = "./agency-dashboard.html";
            return;
        }

        // client par défaut
        localStorage.setItem("user", JSON.stringify({
            email,
            role:"client"
        }));

        window.location.href = "./client-dashboard.html";

    }, 1200);
});

</script>

</body>
</html>
