<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Client - PIBLAY</title>

<!-- chemins corrigés -->
<link rel="stylesheet" href="./css/style.css">
<link rel="icon" href="./images/favicon.png">

<style>
body {
    display: flex;
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0a192f;
    color: #e6f1ff;
}

.sidebar {
    width: 220px;
    background: #020617;
    padding: 20px;
    height: 100vh;
}

.sidebar h3 {
    color: #ec6111;
}

.sidebar a, .sidebar button {
    display: block;
    margin: 15px 0;
    color: #94a3b8;
    text-decoration: none;
    background: none;
    border: none;
    cursor: pointer;
}

.main {
    flex: 1;
    padding: 30px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}

.main-btn {
    padding: 12px;
    background: linear-gradient(135deg,#ffd700,#ffcc00);
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="sidebar">
    <h3>PIBLAY</h3>

    <a href="#">📊 Analytics</a>
    <a href="#">💳 Plan</a>
    <a href="#">❓ Aide</a>

    <button onclick="logout()">🚪 Déconnexion</button>
</div>

<div class="main">

<div class="card">
    <h2>Profil Client</h2>
    <p id="status">Chargement...</p>
</div>

<div class="card">
    <h3>Analytics (simulation temps réel)</h3>
    <p id="clicks">Clics: 0</p>
    <p id="impressions">Impressions: 0</p>
</div>

</div>

<script>

// ================= USER DEMO =================
let user = JSON.parse(localStorage.getItem("user"));

if(!user){
    user = {
        role: "client",
        active: true
    };
    localStorage.setItem("user", JSON.stringify(user));
}

// ================= PROFIL =================
function loadProfile(){

    if(!user.active){
        alert("Compte non activé !");
        window.location.href = "./plans.html";
        return;
    }

    document.getElementById("status").innerText =
        "Compte actif ✔";
}

loadProfile();

// ================= SIMULATION TEMPS RÉEL =================
let clicks = 0;
let impressions = 0;

setInterval(()=>{
    clicks += Math.floor(Math.random()*5);
    impressions += Math.floor(Math.random()*10);

    document.getElementById("clicks").innerText =
        "Clics: " + clicks;

    document.getElementById("impressions").innerText =
        "Impressions: " + impressions;

},2000);

// ================= LOGOUT =================
function logout(){
    localStorage.clear();
    window.location.href = "./login.html";
}

</script>

</body>
</html>
