<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mot de passe oublié - PIBLAY</title>

<!-- chemins corrigés -->
<link rel="stylesheet" href="./register.css">
<link rel="icon" href="./favicon.ico">

<style>
#msg {
    margin-top: 15px;
    text-align: center;
    font-size: 0.9rem;
    display: none;
}

.success { color: #34d399; }
.error { color: #f87171; }

.loading {
    opacity: 0.7;
    pointer-events: none;
}

.role-switch {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.role-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ec6111;
    background: transparent;
    color: white;
    cursor: pointer;
}

.role-btn.active {
    background: #ec6111;
}
</style>

</head>

<body>

<div class="container">

<h2>Mot de passe oublié</h2>

<p>Choisissez votre type de compte et entrez votre email</p>

<div class="role-switch">
    <button type="button" class="role-btn active" id="clientBtn">Client</button>
    <button type="button" class="role-btn" id="agencyBtn">Agence</button>
</div>

<div id="msg"></div>

<form id="forgotForm">

    <div class="input-group">
        <input type="email" id="email" placeholder="Votre email" required>
    </div>

    <button class="btn-submit" id="submitBtn">Envoyer</button>

</form>

</div>

<script>

let role = "client";

const clientBtn = document.getElementById("clientBtn");
const agencyBtn = document.getElementById("agencyBtn");

clientBtn.onclick = () => {
    role = "client";
    clientBtn.classList.add("active");
    agencyBtn.classList.remove("active");
};

agencyBtn.onclick = () => {
    role = "agency";
    agencyBtn.classList.add("active");
    clientBtn.classList.remove("active");
};

const form = document.getElementById("forgotForm");
const msg = document.getElementById("msg");
const btn = document.getElementById("submitBtn");

form.addEventListener("submit", async (e)=>{
    e.preventDefault();

    const email = document.getElementById("email").value;

    if(!email.includes("@")){
        msg.style.display = "block";
        msg.className = "error";
        msg.innerText = "Email invalide";
        return;
    }

    btn.classList.add("loading");
    btn.innerText = "Envoi...";

    try {
        // ⚠️ MODE DEMO (pas de backend)
        console.log("Reset demandé pour :", email, role);

        await new Promise(r => setTimeout(r, 1500)); // simulation

        msg.style.display = "block";
        msg.className = "success";
        msg.innerText = "✔ Si cet email existe, un lien a été envoyé.";

        form.reset();

    } catch(err) {
        msg.style.display = "block";
        msg.className = "error";
        msg.innerText = "Erreur. Réessayez.";
    }

    btn.classList.remove("loading");
    btn.innerText = "Envoyer";
});
</script>

</body>
</html>
